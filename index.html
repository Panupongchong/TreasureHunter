<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Peer Platformer — 4P Prototype</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
<style>
  :root{
    --bg:#12141c; --panel:#1b1e2a; --ink:#e8eaf2; --dim:#8890a6;
    --accent:#ffd23f; --edge:#2a2e40;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Courier New", monospace;
    display:flex; flex-direction:column; align-items:center;
    min-height:100vh; padding:16px; gap:12px;
  }
  h1{font-size:20px; letter-spacing:2px; color:var(--accent);}
  #lobby{
    background:var(--panel); border:1px solid var(--edge); border-radius:8px;
    padding:20px; width:100%; max-width:420px; display:flex; flex-direction:column; gap:10px;
  }
  #lobby input{
    background:var(--bg); border:1px solid var(--edge); border-radius:4px;
    color:var(--ink); padding:10px; font-family:inherit; font-size:14px; width:100%;
    text-transform:none;
  }
  #lobby input#roomInput{text-transform:uppercase;}
  #lobby button{
    background:var(--accent); border:none; border-radius:4px; color:#12141c;
    padding:10px; font-family:inherit; font-weight:bold; font-size:14px; cursor:pointer;
  }
  #lobby button.secondary{background:transparent; border:1px solid var(--edge); color:var(--ink);}
  #lobby button:disabled{opacity:.5; cursor:default;}
  .row{display:flex; gap:8px;}
  .row > *{flex:1;}
  #status{font-size:12px; color:var(--dim); min-height:16px; text-align:center;}
  #roomBadge{
    display:none; font-size:14px; text-align:center; padding:8px;
    border:1px dashed var(--accent); border-radius:4px; color:var(--accent);
    letter-spacing:3px; cursor:pointer;
  }
  #game{display:none; flex-direction:column; align-items:center; gap:8px;}
  canvas{
    background:#0b0d14; border:1px solid var(--edge); border-radius:6px;
    max-width:100%; height:auto; image-rendering:pixelated;
  }
  #hud{font-size:12px; color:var(--dim); text-align:center;}
  #hud b{color:var(--accent);}
  .hint{font-size:11px; color:var(--dim); text-align:center;}
  /* --- Touch controls (shown on touch devices only) --- */
  #touch{
    display:none; width:100%; max-width:900px;
    justify-content:space-between; align-items:center;
    padding:4px 8px; user-select:none; -webkit-user-select:none;
  }
  .tgroup{display:flex; gap:14px;}
  .tbtn{
    width:72px; height:72px; border-radius:50%;
    background:var(--panel); border:2px solid var(--edge);
    color:var(--ink); font-size:26px; font-family:inherit;
    display:flex; align-items:center; justify-content:center;
    touch-action:none; -webkit-tap-highlight-color:transparent;
  }
  .tbtn:active, .tbtn.down{background:var(--accent); color:#12141c; border-color:var(--accent);}
  #jumpBtn{width:86px; height:86px;}
  body.touch-mode #touch{display:flex;}
  body.touch-mode .hint{display:none;}
  canvas{touch-action:none;}
</style>
</head>
<body>

<h1>PEER PLATFORMER</h1>

<div id="lobby">
  <input id="nameInput" maxlength="10" placeholder="Your name" value="">
  <button id="hostBtn">Create room (host)</button>
  <div class="row">
    <input id="roomInput" maxlength="4" placeholder="CODE">
    <button id="joinBtn" class="secondary">Join room</button>
  </div>
  <div id="status"></div>
</div>

<div id="game">
  <div id="roomBadge" title="Click to copy">ROOM ----</div>
  <canvas id="cv" width="900" height="540"></canvas>
  <div id="touch">
    <div class="tgroup">
      <div class="tbtn" id="leftBtn">◀</div>
      <div class="tbtn" id="rightBtn">▶</div>
    </div>
    <div class="tgroup">
      <div class="tbtn" id="jumpBtn">▲</div>
    </div>
  </div>
  <div id="hud"></div>
  <div class="hint">Move: ← → or A D &nbsp;·&nbsp; Jump: ↑ / W / Space</div>
</div>

<script>
/* ============================================================
   Peer Platformer — 4-player prototype (star topology)
   Host relays every player's state to everyone else.
   Uses PeerJS free public broker (no backend needed).
   ============================================================ */

// ---------- Config ----------
const MAX_PLAYERS = 4;
const TICK_MS = 50;              // network send rate (20/s)
const W = 900, H = 540;
const GRAV = 0.55, MOVE = 0.9, MAXVX = 5.2, JUMP = -11.5, FRICTION = 0.82;
const COLORS = ["#ffd23f", "#4fd1c5", "#f47fb0", "#8ecae6"];
const PREFIX = "pfproto-";       // namespaces our room IDs on the public broker

// Level: bounded box + platforms  [x, y, w, h]
const PLATFORMS = [
  [0, 510, 900, 30],             // floor
  [0, 0, 12, 540], [888, 0, 12, 540], [0, 0, 900, 12], // walls + ceiling
  [120, 420, 160, 14],
  [360, 350, 180, 14],
  [640, 420, 160, 14],
  [80, 280, 140, 14],
  [420, 220, 160, 14],
  [700, 280, 140, 14],
  [280, 130, 340, 14],
];

// ---------- State ----------
let peer = null;
let isHost = false;
let hostConn = null;             // joiner: connection to host
let conns = {};                  // host: peerId -> connection
let myId = null;
let roomCode = "";

// players[id] = {x,y,vx,vy,name,color,onGround,face}
const players = {};

// ---------- DOM ----------
const $ = (id) => document.getElementById(id);
const statusEl = $("status");
const setStatus = (t) => statusEl.textContent = t;

// ---------- Lobby ----------
function randomCode() {
  const chars = "ABCDEFGHJKMNPQRSTUVWXYZ23456789";
  let s = "";
  for (let i = 0; i < 4; i++) s += chars[Math.floor(Math.random() * chars.length)];
  return s;
}

$("hostBtn").onclick = () => {
  const name = $("nameInput").value.trim() || "P1";
  roomCode = randomCode();
  isHost = true;
  setStatus("Creating room…");
  lockLobby();

  peer = new Peer(PREFIX + roomCode);
  wirePeerErrors();

  peer.on("open", (id) => {
    myId = id;
    spawnPlayer(myId, name, 0);
    startGame();
    setStatus("");
  });

  peer.on("connection", (conn) => {
    // Reject if full
    if (Object.keys(players).length >= MAX_PLAYERS) {
      conn.on("open", () => { conn.send({ t: "full" }); setTimeout(() => conn.close(), 200); });
      return;
    }
    conn.on("open", () => {
      conns[conn.peer] = conn;
      conn.on("data", (msg) => hostOnData(conn, msg));
      conn.on("close", () => dropPlayer(conn.peer));
      conn.on("error", () => dropPlayer(conn.peer));
    });
  });
};

$("joinBtn").onclick = () => {
  const code = $("roomInput").value.trim().toUpperCase();
  if (code.length !== 4) { setStatus("Enter the 4-letter room code."); return; }
  const name = $("nameInput").value.trim() || "P?";
  roomCode = code;
  isHost = false;
  setStatus("Connecting…");
  lockLobby();

  peer = new Peer();
  wirePeerErrors();

  peer.on("open", (id) => {
    myId = id;
    hostConn = peer.connect(PREFIX + code, { reliable: false });

    const failTimer = setTimeout(() => {
      setStatus("Could not reach that room. Check the code.");
      unlockLobby();
    }, 8000);

    hostConn.on("open", () => {
      clearTimeout(failTimer);
      hostConn.send({ t: "hello", name });
    });
    hostConn.on("data", (msg) => joinerOnData(msg));
    hostConn.on("close", () => {
      setStatus("Host disconnected.");
      location.reload();
    });
  });
};

function lockLobby(){ $("hostBtn").disabled = $("joinBtn").disabled = true; }
function unlockLobby(){ $("hostBtn").disabled = $("joinBtn").disabled = false; }

function wirePeerErrors(){
  peer.on("error", (err) => {
    if (err.type === "unavailable-id") setStatus("Room code collision — try hosting again.");
    else if (err.type === "peer-unavailable") { setStatus("Room not found. Check the code."); unlockLobby(); }
    else setStatus("Network error: " + err.type);
  });
}

// ---------- Messages ----------
// {t:"hello", name}                        joiner -> host
// {t:"welcome", you, roster:{id:{...}}}    host -> joiner
// {t:"full"}                               host -> joiner
// {t:"s", id, x, y, vx, f}                 state update (both directions; host relays)
// {t:"leave", id}                          host -> all

function hostOnData(conn, msg) {
  if (msg.t === "hello") {
    const slot = Object.keys(players).length;
    spawnPlayer(conn.peer, sanitize(msg.name), slot);
    // Send the new player the full roster
    const roster = {};
    for (const [id, p] of Object.entries(players)) {
      roster[id] = { x: p.x, y: p.y, name: p.name, color: p.color };
    }
    conn.send({ t: "welcome", you: conn.peer, roster });
    updateHud();
  } else if (msg.t === "s") {
    applyState(msg);
    relay(msg, conn.peer); // forward to everyone except sender
  }
}

function joinerOnData(msg) {
  if (msg.t === "welcome") {
    for (const [id, p] of Object.entries(msg.roster)) {
      if (!players[id]) players[id] = makePlayer(p.x, p.y, p.name, p.color);
    }
    startGame();
    setStatus("");
  } else if (msg.t === "full") {
    setStatus("Room is full (4/4).");
    unlockLobby();
  } else if (msg.t === "s") {
    applyState(msg);
  } else if (msg.t === "leave") {
    delete players[msg.id];
    updateHud();
  }
}

function relay(msg, exceptId) {
  for (const [id, c] of Object.entries(conns)) {
    if (id !== exceptId && c.open) c.send(msg);
  }
}

function applyState(msg) {
  const p = players[msg.id];
  if (!p) { // late roster entry (rare) — create a placeholder
    players[msg.id] = makePlayer(msg.x, msg.y, msg.n || "P?", msg.c || "#ccc");
  } else {
    p.tx = msg.x; p.ty = msg.y; p.vx = msg.vx; p.face = msg.f;
    p.last = Date.now();
  }
}

// WebRTC "close" can take 15-30s to fire after a tab closes — or never,
// on abrupt drops — so removal is driven by this heartbeat timeout instead.
const DROP_MS = 3000;
function dropStale() {
  const now = Date.now();
  for (const [id, p] of Object.entries(players)) {
    if (id === myId || now - p.last <= DROP_MS) continue;
    if (isHost) {
      conns[id]?.close();
      dropPlayer(id);
    } else {
      delete players[id];
      updateHud();
    }
  }
}

function dropPlayer(id) {
  delete conns[id];
  delete players[id];
  relay({ t: "leave", id }, id);
  updateHud();
}

function sanitize(s){ return String(s).slice(0, 10).replace(/[<>&]/g, ""); }

// ---------- Players ----------
function makePlayer(x, y, name, color) {
  return { x, y, tx: x, ty: y, vx: 0, vy: 0, name, color, onGround: false, face: 1, last: Date.now() };
}

function spawnPlayer(id, name, slot) {
  const spawns = [[80, 460], [780, 460], [200, 360], [680, 360]];
  const [sx, sy] = spawns[slot % 4];
  players[id] = makePlayer(sx, sy, name, COLORS[slot % 4]);
  updateHud();
}

// ---------- Game loop ----------
const keys = {};
addEventListener("keydown", (e) => {
  keys[e.code] = true;
  if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Space"].includes(e.code)) e.preventDefault();
});
addEventListener("keyup", (e) => keys[e.code] = false);

// ---------- Touch controls ----------
// Touch buttons write into the same `keys` object as the keyboard,
// so the game logic doesn't care which input you use.
const isTouch = matchMedia("(pointer: coarse)").matches || "ontouchstart" in window;
if (isTouch) document.body.classList.add("touch-mode");

function bindTouch(btnId, code) {
  const el = $(btnId);
  const press = (e) => { e.preventDefault(); keys[code] = true; el.classList.add("down"); };
  const release = (e) => { e.preventDefault(); keys[code] = false; el.classList.remove("down"); };
  el.addEventListener("pointerdown", press);
  el.addEventListener("pointerup", release);
  el.addEventListener("pointercancel", release);
  el.addEventListener("pointerleave", release);
}
bindTouch("leftBtn", "ArrowLeft");
bindTouch("rightBtn", "ArrowRight");
bindTouch("jumpBtn", "ArrowUp");

// Stop the page from scrolling/bouncing while playing on mobile
document.addEventListener("touchmove", (e) => {
  if (running) e.preventDefault();
}, { passive: false });

const cv = $("cv"), ctx = cv.getContext("2d");
let running = false;

function startGame() {
  if (running) return;
  running = true;
  $("lobby").style.display = "none";
  $("game").style.display = "flex";
  const badge = $("roomBadge");
  badge.style.display = "block";
  badge.textContent = "ROOM " + roomCode;
  badge.onclick = () => navigator.clipboard?.writeText(roomCode);
  updateHud();
  requestAnimationFrame(loop);
  setInterval(sendState, TICK_MS);
  setInterval(dropStale, 1000);
}

function loop() {
  step();
  draw();
  requestAnimationFrame(loop);
}

function step() {
  const me = players[myId];
  if (me) {
    // input
    const left = keys["ArrowLeft"] || keys["KeyA"];
    const right = keys["ArrowRight"] || keys["KeyD"];
    const jump = keys["ArrowUp"] || keys["KeyW"] || keys["Space"];

    if (left)  { me.vx -= MOVE; me.face = -1; }
    if (right) { me.vx += MOVE; me.face = 1; }
    if (!left && !right) me.vx *= FRICTION;
    me.vx = Math.max(-MAXVX, Math.min(MAXVX, me.vx));
    if (jump && me.onGround) { me.vy = JUMP; me.onGround = false; }

    me.vy += GRAV;
    moveAndCollide(me);
  }

  // Smooth remote players toward their last reported position
  for (const [id, p] of Object.entries(players)) {
    if (id === myId) continue;
    p.x += (p.tx - p.x) * 0.35;
    p.y += (p.ty - p.y) * 0.35;
  }
}

const PW = 26, PH = 34; // player size

function moveAndCollide(p) {
  // horizontal
  p.x += p.vx;
  for (const [px, py, pw, ph] of PLATFORMS) {
    if (overlap(p.x, p.y, PW, PH, px, py, pw, ph)) {
      if (p.vx > 0) p.x = px - PW; else if (p.vx < 0) p.x = px + pw;
      p.vx = 0;
    }
  }
  // vertical
  p.y += p.vy;
  p.onGround = false;
  for (const [px, py, pw, ph] of PLATFORMS) {
    if (overlap(p.x, p.y, PW, PH, px, py, pw, ph)) {
      if (p.vy > 0) { p.y = py - PH; p.onGround = true; }
      else if (p.vy < 0) p.y = py + ph;
      p.vy = 0;
    }
  }
  // hard bounds (safety net)
  p.x = Math.max(0, Math.min(W - PW, p.x));
  p.y = Math.max(0, Math.min(H - PH, p.y));
}

function overlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

// ---------- Networking tick ----------
function sendState() {
  const me = players[myId];
  if (!me) return;
  const msg = { t: "s", id: myId, x: Math.round(me.x), y: Math.round(me.y),
                vx: +me.vx.toFixed(1), f: me.face, n: me.name, c: me.color };
  if (isHost) relay(msg, myId);
  else if (hostConn && hostConn.open) hostConn.send(msg);
}

// ---------- Render ----------
function draw() {
  ctx.clearRect(0, 0, W, H);

  // platforms
  ctx.fillStyle = "#39406a";
  for (const [x, y, w, h] of PLATFORMS) ctx.fillRect(x, y, w, h);
  ctx.fillStyle = "#4c548a";
  for (const [x, y, w] of PLATFORMS) ctx.fillRect(x, y, w, 3);

  // players
  ctx.textAlign = "center";
  ctx.font = "11px 'Courier New', monospace";
  for (const [id, p] of Object.entries(players)) {
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, PW, PH);
    // eyes
    ctx.fillStyle = "#12141c";
    const ex = p.face === 1 ? p.x + 15 : p.x + 5;
    ctx.fillRect(ex, p.y + 8, 5, 5);
    // name
    ctx.fillStyle = id === myId ? "#fff" : "#aab";
    ctx.fillText(p.name, p.x + PW / 2, p.y - 6);
  }
}

function updateHud() {
  const n = Object.keys(players).length;
  $("hud").innerHTML = `Players: <b>${n}/${MAX_PLAYERS}</b>` +
    (isHost ? " · You are the host" : "");
}
</script>
</body>
</html>
